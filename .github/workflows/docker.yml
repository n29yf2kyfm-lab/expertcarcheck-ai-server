name: Build & Push Docker Image

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/cached-image
          sudo docker image prune -af
          df -h

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: alamk123
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and push (no cache)
        run: |
          # Build with BOTH tags — ai-mechanic-runpod is what RunPod endpoint expects
          docker build --no-cache -t alamk123/ai-mechanic-runpod:latest -t alamk123/ai-mechanic:latest .
          docker push alamk123/ai-mechanic-runpod:latest
          docker push alamk123/ai-mechanic:latest
